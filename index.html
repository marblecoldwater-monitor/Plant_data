<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Treatment Map (Debug Mode)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; }
  #map { height: 100vh; }

  #status {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    padding: 8px;
    z-index: 9999;
    font-family: Arial;
    font-size: 13px;
  }
</style>
</head>

<body>

<div id="status">Loading map...</div>
<div id="map"></div>

<script>

var map = L.map('map').setView([41.6, -87.7], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const status = document.getElementById("status");

// Load GeoJSON from SAME DIRECTORY (important)
fetch('./23-25-Treatments.geojson')
  .then(r => {
    if (!r.ok) throw new Error("GeoJSON failed to load");
    return r.json();
  })
  .then(data => {

    status.innerHTML = "GeoJSON loaded ✔";

    console.log("GeoJSON:", data);

    if (!data.features || data.features.length === 0) {
      status.innerHTML = "GeoJSON has NO features ❌";
      return;
    }

    const layer = L.geoJSON(data, {
      onEachFeature: function (feature, layer) {
        layer.bindPopup(JSON.stringify(feature.properties));
      }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

    status.innerHTML = "Features rendered ✔";

  })
  .catch(err => {
    console.error(err);
    status.innerHTML = "ERROR loading GeoJSON ❌ Check console";
  });

</script>

</body>
</html>

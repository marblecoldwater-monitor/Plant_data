<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GeoJSON Debug Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; }
  #map { height: 100vh; }

  #status {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: white;
    padding: 10px;
    font-family: Arial;
    font-size: 13px;
    max-width: 320px;
  }
</style>
</head>

<body>

<div id="status">Loading...</div>
<div id="map"></div>

<script>

const status = document.getElementById("status");

var map = L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

fetch('./23-25-Treatments.geojson')
  .then(r => r.json())
  .then(data => {

    console.log("RAW GEOJSON:", data);

    const layer = L.geoJSON(data, {
      style: {
        color: "red",
        weight: 3,
        fillColor: "red",
        fillOpacity: 0.5
      }
    }).addTo(map);

    const bounds = layer.getBounds();

    console.log("BOUNDS:", bounds);

    status.innerHTML =
      "Bounds: " +
      JSON.stringify(bounds);

    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [30, 30] });
    } else {
      status.innerHTML = "Invalid bounds ❌";
    }

  })
  .catch(err => {
    console.error(err);
    status.innerHTML = "FAILED TO LOAD GEOJSON ❌";
  });

</script>

</body>
</html>

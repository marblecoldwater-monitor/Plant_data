<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Lake Treatment Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; }
  #map { height: 100vh; }
  .legend {
    background: white;
    padding: 10px;
    font-size: 14px;
    line-height: 1.6em;
  }
</style>
</head>

<body>
<div id="map"></div>

<script>
var map = L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// Color by treatment type
function getColor(t) {
  return t === 'Herbicide' ? '#e41a1c' :
         t === 'Mechanical' ? '#377eb8' :
         t === 'Biological' ? '#4daf4a' :
         '#984ea3';
}

// Load GeoJSON from same folder
fetch('23-25-Treatments.geojson')
  .then(response => response.json())
  .then(data => {

    var geoLayer = L.geoJSON(data, {
      style: function(feature) {
        return {
          color: getColor(feature.properties.Treatment),
          weight: 2,
          fillOpacity: 0.5
        };
      },
      onEachFeature: function(feature, layer) {
        var p = feature.properties;
        layer.bindPopup(
          "<b>Treatment:</b> " + (p.Treatment || 'N/A') + "<br>" +
          "<b>Date:</b> " + (p.Date || 'N/A') + "<br>" +
          "<b>Notes:</b> " + (p.Notes || 'N/A')
        );
      }
    }).addTo(map);

    // Auto zoom to the data
    map.fitBounds(geoLayer.getBounds());
  });

// Legend
var legend = L.control({position: 'bottomright'});
legend.onAdd = function () {
  var div = L.DomUtil.create('div', 'legend');
  div.innerHTML += "<b>Treatment Types</b><br>";
  div.innerHTML += "<i style='background:#e41a1c;width:12px;height:12px;display:inline-block'></i> Herbicide<br>";
  div.innerHTML += "<i style='background:#377eb8;width:12px;height:12px;display:inline-block'></i> Mechanical<br>";
  div.innerHTML += "<i style='background:#4daf4a;width:12px;height:12px;display:inline-block'></i> Biological<br>";
  return div;
};
legend.addTo(map);

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Treatment Map Debug</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; }
  #map { height: 100vh; }

  #status {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: white;
    padding: 10px;
    font-family: Arial;
    font-size: 14px;
    max-width: 300px;
  }
</style>
</head>

<body>

<div id="status">Loading map...</div>
<div id="map"></div>

<script>

var map = L.map('map').setView([41.6, -87.7], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const status = document.getElementById("status");

fetch('./23-25-Treatments.geojson')
  .then(response => {
    console.log("HTTP status:", response.status);

    if (!response.ok) {
      throw new Error("File not found or cannot be loaded");
    }

    return response.json();
  })
  .then(data => {

    console.log("GeoJSON loaded:", data);

    if (!data || !data.features || data.features.length === 0) {
      status.innerHTML = "GeoJSON loaded but has NO features ❌";
      return;
    }

    const layer = L.geoJSON(data, {
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          Object.entries(feature.properties || {})
            .map(([k,v]) => `<b>${k}:</b> ${v}`)
            .join("<br>")
        );
      }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

    status.innerHTML = "Features loaded and rendered ✔";

  })
  .catch(err => {
    console.error(err);
    status.innerHTML = "ERROR loading GeoJSON ❌ Check console";
  });

</script>

</body>
</html>
